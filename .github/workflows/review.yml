name: ReviewBot - Code Review

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # 1. Check out the consumer's repo (where the PR lives + .reviewbot/ config)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Check out the ReviewBot engine into a temp dir
      - name: Checkout ReviewBot engine
        uses: actions/checkout@v4
        with:
          repository: praveenkumardec89/reviewbot
          ref: main
          path: _reviewbot_engine

      # 3. Copy engine + templates into workspace so imports resolve correctly
      - name: Install ReviewBot engine
        run: |
          cp -r _reviewbot_engine/engine ./engine
          cp -r _reviewbot_engine/templates ./templates
          rm -rf _reviewbot_engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pyyaml requests

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.patch

      # Bootstrap .reviewbot/ from templates if repo hasn't set it up yet
      - name: Bootstrap knowledge store
        run: |
          if [ ! -d ".reviewbot" ]; then
            echo "No .reviewbot/ found — bootstrapping from defaults"
            mkdir -p .reviewbot/history
            cp templates/default-rules.yaml .reviewbot/rules.yaml
            cp templates/default-config.yaml .reviewbot/config.yaml
            echo '{}' > .reviewbot/patterns.json
            echo '{}' > .reviewbot/scores.json
            echo '{}' > .reviewbot/infra.yaml
            echo '[]' > .reviewbot/history/improvements.json
          fi

      - name: Run multi-agent review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DIFF_FILE: /tmp/pr_diff.patch
        run: python -m engine.reviewer

  track-feedback:
    name: Track Review Feedback
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ReviewBot engine
        uses: actions/checkout@v4
        with:
          repository: praveenkumardec89/reviewbot
          ref: main
          path: _reviewbot_engine

      - name: Install ReviewBot engine
        run: |
          cp -r _reviewbot_engine/engine ./engine
          rm -rf _reviewbot_engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Collect feedback signals
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: python -m engine.feedback_collector

  detect-revert:
    name: Detect PR Reverts
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'Revert')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ReviewBot engine
        uses: actions/checkout@v4
        with:
          repository: praveenkumardec89/reviewbot
          ref: main
          path: _reviewbot_engine

      - name: Install ReviewBot engine
        run: |
          cp -r _reviewbot_engine/engine ./engine
          rm -rf _reviewbot_engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Record revert signal
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python -m engine.revert_tracker
