name: ReviewBot - Self Improvement

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR created)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  self-improve:
    name: Learn & Improve Rules
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Checkout ReviewBot engine
        uses: actions/checkout@v4
        with:
          repository: praveenkumardec89/reviewbot
          ref: main
          path: _reviewbot_engine

      - name: Install ReviewBot engine
        run: |
          cp -r _reviewbot_engine/engine ./engine
          rm -rf _reviewbot_engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pyyaml requests

      - name: Check knowledge store exists
        run: |
          if [ ! -d ".reviewbot" ]; then
            echo "No .reviewbot directory found. Skipping self-improvement."
            exit 0
          fi

      - name: Collect all learning signals
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: python -m engine.signal_aggregator

      - name: Run self-improvement engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python -m engine.self_improver

      - name: Create improvement PR
        if: env.HAS_IMPROVEMENTS == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          BRANCH="reviewbot/self-improvement-$(date +%Y%m%d)"
          git config user.name "ReviewBot"
          git config user.email "reviewbot@noreply.github.com"
          git checkout -b "$BRANCH"
          git add .reviewbot/
          git commit -m "reviewbot: self-improvement update

          Changes based on feedback analysis:
          $(cat /tmp/improvement_summary.txt)

          This PR was auto-generated by ReviewBot's self-improvement engine.
          Please review the rule changes before merging."

          git push origin "$BRANCH"

          gh pr create \
            --title "🤖 ReviewBot: Self-improvement update ($(date +%Y-%m-%d))" \
            --body "$(cat /tmp/improvement_pr_body.md)" \
            --label "reviewbot,self-improvement"

  build-fixer:
    name: Auto-Fix Build Failures
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'build-failure')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ReviewBot engine
        uses: actions/checkout@v4
        with:
          repository: praveenkumardec89/reviewbot
          ref: main
          path: _reviewbot_engine

      - name: Install ReviewBot engine
        run: |
          cp -r _reviewbot_engine/engine ./engine
          rm -rf _reviewbot_engine

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pyyaml requests

      - name: Analyze and fix build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -m engine.build_fixer
