# Copy this file to YOUR repo at .github/workflows/reviewbot.yml
# Then add ANTHROPIC_API_KEY as a repo secret

name: ReviewBot
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday 2 AM — self-improvement run
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual action'
        type: choice
        options:
          - self-improve
          - re-review
          - reset-scores

jobs:
  # ─── PR Review ─────────────────────────────────────
  ai-review:
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize')
    uses: YOUR_ORG/reviewbot/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─── Feedback Tracking ────────────────────────────
  track-feedback:
    if: github.event_name == 'pull_request_review'
    uses: YOUR_ORG/reviewbot/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─── Revert Detection ─────────────────────────────
  detect-revert:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'Revert')
    uses: YOUR_ORG/reviewbot/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─── Weekly Self-Improvement ───────────────────────
  self-improve:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'self-improve')
    uses: YOUR_ORG/reviewbot/.github/workflows/self-improve.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ─── Build Failure Auto-Fix ────────────────────────
  build-fixer:
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'build-failure')
    uses: YOUR_ORG/reviewbot/.github/workflows/self-improve.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
