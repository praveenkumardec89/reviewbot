# ─────────────────────────────────────────────────────────────────────────────
# ReviewCrew — Copy this file to YOUR repo at .github/workflows/reviewcrew.yml
#
# Setup (one-time, ~5 minutes):
#   1. Copy this file to .github/workflows/reviewcrew.yml in your repo
#   2. Add ANTHROPIC_API_KEY to your repo secrets:
#      Settings → Secrets and variables → Actions → New repository secret
#   3. (Optional but recommended) Describe your architecture:
#      curl -s https://raw.githubusercontent.com/praveenkumardec89/reviewcrew/main/scripts/setup.sh | bash
#      then edit .reviewcrew/architecture.yaml
#   4. Commit and push — ReviewCrew activates on your next PR
#
# Developer commands (comment on any PR in this repo):
#   /reviewcrew fix all          → fix every open ReviewCrew comment
#   /reviewcrew fix critical     → fix only critical issues
#   /reviewcrew fix high         → fix critical + high severity
#   /reviewcrew fix security     → fix only security findings
#   /reviewcrew fix code_quality → fix by agent name
#   /reviewcrew fix architecture
#   /reviewcrew fix performance
#   /reviewcrew fix test_coverage
#   /reviewcrew fix simplification
#
# Note: /reviewcrew fix only works on PRs from THIS repo (not forks).
# This is a GitHub security constraint — fork PRs cannot receive pushes
# from workflows triggered by issue_comment events.
# ─────────────────────────────────────────────────────────────────────────────

name: ReviewCrew

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  schedule:
    - cron: '0 2 * * 0'    # Weekly self-improvement (Sunday 2 AM UTC)
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual action'
        type: choice
        options:
          - self-improve
          - re-review

# Grant enough permissions for all jobs.
# ReviewCrew needs: read code, write PR reviews/comments, push fix commits.
permissions:
  contents: write        # push auto-fix commits to PR branches
  pull-requests: write   # post review comments and inline findings
  issues: write          # react to /reviewcrew fix comments, post summaries

jobs:

  # ── PR Review ───────────────────────────────────────────────────────────────
  ai-review:
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      !startsWith(github.head_ref, 'reviewcrew/')
    uses: praveenkumardec89/reviewcrew/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Auto Fix — Step 1: parse comment + acknowledge ────────────────────────
  # Parses "/reviewcrew fix [scope]" and reacts with 👍 to acknowledge.
  # Runs as a regular job (needs steps) before calling the reusable fix workflow.
  auto-fix-parse:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/reviewcrew fix')
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.parse.outputs.pr_number }}
      fix_scope: ${{ steps.parse.outputs.scope }}
      is_fork_pr: ${{ steps.parse.outputs.is_fork_pr }}
    steps:
      - name: Parse fix scope from comment
        id: parse
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Pass comment via env var — never interpolate user input directly into shell
          SCOPE=$(echo "$COMMENT_BODY" | sed 's|/reviewcrew fix||' | xargs | sed 's/[^a-zA-Z0-9_-]//g')
          SCOPE=${SCOPE:-all}
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

          # Detect if the PR is from a fork (auto-fix cannot push to forks)
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          HEAD_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name')
          BASE_REPO="${{ github.repository }}"
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "is_fork_pr=true" >> $GITHUB_OUTPUT
          else
            echo "is_fork_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Acknowledge with 👍 reaction
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content='+1' || true   # non-fatal if reactions are restricted

      - name: Warn if fork PR (cannot auto-fix)
        if: steps.parse.outputs.is_fork_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -X POST -f body="⚠️ **ReviewCrew**: Auto-fix cannot push to fork PRs due to GitHub security constraints. Ask the PR author to run \`/reviewcrew fix ${{ steps.parse.outputs.scope }}\` from their fork, or apply the suggested fixes manually."

  # ── Auto Fix — Step 2: run the fix engine ─────────────────────────────────
  # Called only when Step 1 succeeds and the PR is not from a fork.
  auto-fix-run:
    needs: auto-fix-parse
    if: >
      needs.auto-fix-parse.result == 'success' &&
      needs.auto-fix-parse.outputs.is_fork_pr == 'false'
    uses: praveenkumardec89/reviewcrew/.github/workflows/fix.yml@main
    with:
      pr_number: ${{ needs.auto-fix-parse.outputs.pr_number }}
      fix_scope: ${{ needs.auto-fix-parse.outputs.fix_scope }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Feedback Tracking ───────────────────────────────────────────────────────
  track-feedback:
    if: github.event_name == 'pull_request_review'
    uses: praveenkumardec89/reviewcrew/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Revert Detection ────────────────────────────────────────────────────────
  detect-revert:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'Revert')
    uses: praveenkumardec89/reviewcrew/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Weekly Self-Improvement ─────────────────────────────────────────────────
  self-improve:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'self-improve')
    uses: praveenkumardec89/reviewcrew/.github/workflows/self-improve.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Build Failure Auto-Fix ──────────────────────────────────────────────────
  build-fixer:
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'build-failure')
    uses: praveenkumardec89/reviewcrew/.github/workflows/self-improve.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
