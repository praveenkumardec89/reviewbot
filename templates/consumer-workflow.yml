# ─────────────────────────────────────────────────────────────────────────────
# ReviewCrew — Copy this file to YOUR repo at .github/workflows/reviewcrew.yml
#
# Setup (one-time):
#   1. Copy this file to .github/workflows/reviewcrew.yml in your repo
#   2. Add ANTHROPIC_API_KEY to your repo secrets:
#      Settings → Secrets and variables → Actions → New repository secret
#   3. (Optional) Initialize .reviewcrew/ config:
#      curl -s https://raw.githubusercontent.com/praveenkumardec89/reviewcrew/main/scripts/setup.sh | bash
#   4. Commit and push — ReviewCrew activates on your next PR
# ─────────────────────────────────────────────────────────────────────────────

name: ReviewCrew
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  pull_request_review:
    types: [submitted]
  issues:
    types: [labeled]
  schedule:
    - cron: '0 2 * * 0'   # Weekly self-improvement (Sunday 2 AM UTC)
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual action'
        type: choice
        options:
          - self-improve
          - re-review

jobs:
  # ── PR Review ───────────────────────────────────────────────────────────────
  ai-review:
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      !startsWith(github.head_ref, 'reviewcrew/')
    uses: praveenkumardec89/reviewcrew/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Feedback Tracking ───────────────────────────────────────────────────────
  track-feedback:
    if: github.event_name == 'pull_request_review'
    uses: praveenkumardec89/reviewcrew/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Revert Detection ────────────────────────────────────────────────────────
  detect-revert:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'Revert')
    uses: praveenkumardec89/reviewcrew/.github/workflows/review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Weekly Self-Improvement ─────────────────────────────────────────────────
  self-improve:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'self-improve')
    uses: praveenkumardec89/reviewcrew/.github/workflows/self-improve.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Build Failure Auto-Fix ──────────────────────────────────────────────────
  build-fixer:
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'build-failure')
    uses: praveenkumardec89/reviewcrew/.github/workflows/self-improve.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
